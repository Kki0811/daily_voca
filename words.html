<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 아이 맞춤형 스마트 리스닝 단어장</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #f0f8ff; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 5px; }
        .sub-title { font-size: 14px; color: #666; margin-bottom: 20px; }
        .nav-buttons { margin-bottom: 20px; }
        button { color: white; border: none; padding: 10px 18px; font-size: 15px; border-radius: 8px; cursor: pointer; margin: 4px; font-weight: bold; }
        button:active { transform: scale(0.98); }
        .page { display: none; }
        .active { display: block; }
        input { width: 80%; padding: 10px; margin: 8px 0; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
        
        /* 버튼 색상 정의 */
        .btn-quiz { background-color: #4cae4c; }
        .btn-admin { background-color: #70a1ff; }
        .btn-save { background-color: #2ed573; width: 85%; margin-top: 15px; }
        .btn-backup { background-color: #ffa502; font-size: 13px; padding: 8px 12px; }
        .btn-restore { background-color: #9b59b6; font-size: 13px; padding: 8px 12px; }
        
        .btn-record { background-color: #ff4757; }
        .btn-record.recording { animation: pulse 1s infinite; background-color: #ff6b81; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        
        /* 퀴즈 및 테이블 스타일 */
        .quiz-progress { font-size: 24px; font-weight: bold; color: #ff4757; margin-bottom: 10px; background: #ffeaa7; display: inline-block; padding: 5px 15px; border-radius: 20px; }
        .quiz-box { border: 2px dashed #1e90ff; padding: 20px; border-radius: 15px; background-color: #f9f9f9; margin: 20px 0; }
        .word-display { font-size: 44px; font-weight: bold; color: #2ed573; margin: 20px 0; min-height: 60px; }
        .meaning-display { font-size: 28px; color: #555; margin: 15px 0; min-height: 40px; }
        .btn-listen { background-color: #ffa502; font-size: 24px; padding: 20px 40px; border-radius: 50px; box-shadow: 0 4px 10px rgba(255, 165, 0, 0.4); margin: 15px 0; width: 85%; }
        
        .backup-zone { background-color: #f9f9f9; border: 1px dashed #bbb; padding: 15px; border-radius: 10px; margin-top: 25px; text-align: left; }
        .score-board { font-size: 18px; text-align: left; background: #f1f2f6; padding: 15px; border-radius: 10px; margin-top: 15px; }
        
        /* 단어 관리 테이블 */
        .table-container { margin-top: 25px; max-height: 400px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f2f2f2; position: sticky; top: 0; }
        .btn-tbl-play { background-color: #9b59b6; padding: 4px 8px; font-size: 12px; }
        .btn-tbl-edit { background-color: #ffa502; padding: 4px 8px; font-size: 12px; }
        .btn-tbl-del { background-color: #ff4757; padding: 4px 8px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🦁 우리 아이 스마트 단어장 </h1>
    <div class="sub-title">대용량 저장소 · 백업 지원 · 단어 편집 관리 기능</div>
    
    <div class="nav-buttons">
        <button class="btn-quiz" onclick="showPage('quiz-page')">🎯 리스닝 테스트</button>
        <button class="btn-admin" onclick="showPage('admin-page')">⚙️ 단어 등록 및 관리</button>
    </div>

    <div id="admin-page" class="page">
        <h3 id="form-title">📝 새 단어와 목소리 등록</h3>
        <input type="text" id="input-word" placeholder="영어 단어 입력 (예: apple)">
        <input type="text" id="input-meaning" placeholder="한국어 뜻 입력 (예: 사과)">
        
        <div style="margin-top: 10px;">
            <button id="record-btn" class="btn-record" onclick="toggleRecording()">🎤 목소리 녹음 시작</button>
            <div id="record-status" style="color: red; font-weight: bold; margin-top: 5px; font-size: 14px;"></div>
            <audio id="audio-preview" controls style="display:none; margin: 10px auto;"></audio>
        </div>
        
        <button class="btn-save" id="btn-save-action" onclick="saveWord()">📌 단어와 음성 파일 저장</button>
        <button class="btn-record" id="btn-cancel-edit" onclick="resetForm()" style="display:none; width:85%; background-color:#747d8c;">❌ 수정 취소하기</button>
        <p id="admin-msg" style="color: blue; font-weight: bold;"></p>

        <h3 style="margin-top: 35px; border-top: 2px solid #70a1ff; padding-top: 20px; text-align: left;">📋 등록된 단어 리스트 (<span id="total-count">0</span>개)</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>영어</th>
                        <th>한국어 뜻</th>
                        <th>발음</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="word-table-body">
                    </tbody>
            </table>
        </div>

        <div class="backup-zone">
            <h4 style="margin: 0 0 10px 0;">💾 데이터 전체 백업 및 복원</h4>
            <button class="btn-backup" onclick="exportDatabase()">📥 현재 단어장 파일로 백업하기</button>
            <div style="margin-top: 12px; border-top: 1px dashed #ccc; padding-top: 12px;">
                <label style="font-weight: bold; font-size: 13px; display: block; margin-bottom: 5px;">📤 백업 파일(.json) 가져오기</label>
                <input type="file" id="import-file" accept=".json" style="width: 100%; font-size: 12px;">
                <button class="btn-restore" onclick="importDatabase()" style="margin-top: 8px; width: 100%;">🔥 선택한 파일로 단어장 복원하기</button>
            </div>
        </div>
    </div>

    <div id="quiz-page" class="page active">
        <div class="quiz-progress" id="quiz-progress-text">문제 0 / 10</div>
        
        <div class="quiz-box">
            <p style="color:#666; font-size:15px; margin:0 0 10px 0;">👇 버튼을 눌러 목소리를 들어보세요!</p>
            <button class="btn-listen" id="play-voice-btn" onclick="playQuizAudio()">🔊 엄마/아빠 목소리 듣기</button>
            
            <div class="word-display" id="quiz-word"></div>
            <div class="meaning-display" id="quiz-meaning"></div>
        </div>
        
        <button onclick="showAnswer()" style="background-color: #747d8c; padding: 12px 25px; font-size: 16px;">👁️ 정답 확인</button>
        <button onclick="nextQuiz()" style="background-color: #ff4757; padding: 12px 25px; font-size: 16px;" id="next-btn">➡️ 다음 문제</button>
        
        <div id="result-box" style="display:none; margin-top:25px;">
            <h2>🎉 대단해요! 테스트 완료!</h2>
            <button onclick="startNewTest()" style="background-color: #2ed573; font-size:18px; padding:15px 30px;">🔄 한 번 더 테스트하기</button>
            <div class="score-board" id="score-board-list"></div>
        </div>
    </div>
</div>

<script>
    // --- [IndexedDB 기반 대용량 스토리지 세팅] ---
    const DB_NAME = "VoiceWordQuizDB";
    const DB_VERSION = 1;
    const STORE_NAME = "words";
    let db = null;

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let currentAudioBase64 = ""; 
    let wordListCache = []; 
    let editingId = null; // 현재 수정 중인 단어의 DB Key 고유값
    
    let quizSet = [];        
    let currentIdx = 0;      
    let totalQuestions = 10; 
    let testedWords = [];    

    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = (event) => reject("DB 개방 에러");
            request.onsuccess = (event) => {
                db = event.target.result;
                loadWordsFromDB().then(() => resolve());
            };
            request.onupgradeneeded = (event) => {
                const dbInstance = event.target.result;
                if (!dbInstance.objectStoreNames.contains(STORE_NAME)) {
                    dbInstance.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
                }
            };
        });
    }

    function loadWordsFromDB() {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction([STORE_NAME], "readonly");
            const store = transaction.objectStore(STORE_NAME);
            const request = store.getAll();
            request.onsuccess = (event) => {
                wordListCache = event.target.result;
                document.getElementById('total-count').innerText = wordListCache.length;
                renderAdminTable(); // 목록 갱신
                resolve(wordListCache);
            };
            request.onerror = () => reject("로드 실패");
        });
    }

    // 부모님용 페이지 하단에 단어 목록 그려주기 (수정/삭제 버튼 결합)
    function renderAdminTable() {
        const tbody = document.getElementById('word-table-body');
        tbody.innerHTML = "";
        
        if (wordListCache.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="color:#888;">등록된 단어가 없습니다.</td></tr>`;
            return;
        }

        wordListCache.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${item.word}</strong></td>
                <td>${item.meaning}</td>
                <td><button class="btn-tbl-play" onclick="playSpecificAudio('${item.audio}')">▶️ 재생</button></td>
                <td>
                    <button class="btn-tbl-edit" onclick="startEditWord(${item.id}, '${item.word}', '${item.meaning}', '${item.audio}')">수정</button>
                    <button class="btn-tbl-del" onclick="deleteWord(${item.id})">삭제</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if(pageId === 'quiz-page') startNewTest();
    }

    // --- [마이크 녹음 기능] ---
    async function toggleRecording() {
        const recordBtn = document.getElementById('record-btn');
        const statusText = document.getElementById('record-status');
        const previewAudio = document.getElementById('audio-preview');

        if (!isRecording) {
            audioChunks = [];
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        currentAudioBase64 = reader.result; 
                        previewAudio.src = currentAudioBase64;
                        previewAudio.style.display = 'block'; 
                    };
                };
                mediaRecorder.start();
                isRecording = true;
                recordBtn.innerText = "🛑 녹음 중지 (완료)";
                recordBtn.classList.add('recording');
                statusText.innerText = "지금 말씀하세요! 녹음 중...";
            } catch (err) {
                alert("마이크 권한 허용이 필요합니다.");
            }
        } else {
            mediaRecorder.stream.getTracks().forEach(track => track.stop()); 
            mediaRecorder.stop();
            isRecording = false;
            recordBtn.innerText = "🎤 다시 녹음하기";
            recordBtn.classList.remove('recording');
            statusText.innerText = "녹음 완료! 아래에서 확인해 보세요.";
        }
    }

    // --- [단어 저장 및 수정 기능] ---
    function saveWord() {
        const word = document.getElementById('input-word').value.trim();
        const meaning = document.getElementById('input-meaning').value.trim();
        const msg = document.getElementById('admin-msg');

        if (!word || !meaning) return alert("영어 단어와 뜻을 입력해 주세요.");
        if (!currentAudioBase64 && !editingId) return alert("목소리를 녹음해 주세요!");

        const transaction = db.transaction([STORE_NAME], "readwrite");
        const store = transaction.objectStore(STORE_NAME);

        if (editingId === null) {
            // [신규 저장 모드]
            const newWordData = { word: word, meaning: meaning, audio: currentAudioBase64 };
            store.add(newWordData).onsuccess = () => {
                loadWordsFromDB().then(() => {
                    resetForm();
                    msg.innerText = `🎉 "${word}" 단어가 새롭게 저장되었습니다!`;
                    setTimeout(() => msg.innerText = "", 3000);
                });
            };
        } else {
            // [기존 내용 수정 모드]
            const updatedData = { id: editingId, word: word, meaning: meaning, audio: currentAudioBase64 };
            store.put(updatedData).onsuccess = () => {
                loadWordsFromDB().then(() => {
                    resetForm();
                    msg.innerText = `🛠️ 단어 수정이 완료되었습니다!`;
                    setTimeout(() => msg.innerText = "", 3000);
                });
            };
        }
    }

    // 목록에서 [수정] 버튼 눌렀을 때 입력창으로 데이터 올리기
    function startEditWord(id, word, meaning, audioBase64) {
        editingId = id;
        document.getElementById('input-word').value = word;
        document.getElementById('input-meaning').value = meaning;
        currentAudioBase64 = audioBase64; // 기존 녹음 유지

        // UI를 수정 모드로 전환
        document.getElementById('form-title').innerText = "🛠️ 기존 단어 내용 수정하기";
        document.getElementById('btn-save-action').innerText = "✅ 수정 완료하기";
        document.getElementById('btn-save-action').style.backgroundColor = "#ffa502";
        document.getElementById('btn-cancel-edit').style.display = "inline-block";
        
        // 미리듣기에 기존 음성 세팅
        const previewAudio = document.getElementById('audio-preview');
        previewAudio.src = audioBase64;
        previewAudio.style.display = 'block';
        document.getElementById('record-status').innerText = "💡 발음 음성을 바꾸려면 새로 녹음하시고, 그대로 쓰시려면 녹음 버튼을 건너뛰세요.";

        // 화면 맨 위 입력 박스로 자동 스크롤
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 목록에서 [삭제] 버튼 작동
    function deleteWord(id) {
        if (!confirm("이 단어와 녹음 파일을 완전히 삭제할까요?")) return;
        
        const transaction = db.transaction([STORE_NAME], "readwrite");
        const store = transaction.objectStore(STORE_NAME);
        store.delete(id).onsuccess = () => {
            if(editingId === id) resetForm(); // 수정 중인 단어를 삭제하면 입력창 리셋
            loadWordsFromDB().then(() => alert("삭제되었습니다."));
        };
    }

    function resetForm() {
        editingId = null;
        document.getElementById('input-word').value = "";
        document.getElementById('input-meaning').value = "";
        document.getElementById('audio-preview').style.display = 'none';
        document.getElementById('audio-preview').src = "";
        document.getElementById('record-status').innerText = "";
        document.getElementById('record-btn').innerText = "🎤 목소리 녹음 시작";
        
        document.getElementById('form-title').innerText = "📝 새 단어와 목소리 등록";
        document.getElementById('btn-save-action').innerText = "📌 단어와 음성 파일 저장";
        document.getElementById('btn-save-action').style.backgroundColor = "#2ed573";
        document.getElementById('btn-cancel-edit').style.display = "none";
        currentAudioBase64 = "";
    }

    function playSpecificAudio(base64) {
        if (base64) new Audio(base64).play();
    }

    // --- [백업 및 로딩] ---
    function exportDatabase() {
        if (wordListCache.length === 0) return alert("백업할 단어가 없습니다.");
        const jsonString = JSON.stringify(wordListCache, null, 2);
        const blob = new Blob([jsonString], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `우리집_단어장_백업_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    function importDatabase() {
        const fileInput = document.getElementById('import-file');
        if (!fileInput.files || fileInput.files.length === 0) return alert("파일을 선택해 주세요.");
        if (!confirm("기존 단어가 전부 지워지고 백업파일로 복원됩니다. 계속할까요?")) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                const transactionClear = db.transaction([STORE_NAME], "readwrite");
                transactionClear.objectStore(STORE_NAME).clear().onsuccess = () => {
                    const transactionAdd = db.transaction([STORE_NAME], "readwrite");
                    const storeAdd = transactionAdd.objectStore(STORE_NAME);
                    importedData.forEach(item => {
                        storeAdd.add({ word: item.word, meaning: item.meaning, audio: item.audio });
                    });
                    transactionAdd.oncomplete = () => {
                        loadWordsFromDB().then(() => {
                            alert("📤 백업 데이터 로딩 및 복원이 완료되었습니다!");
                            fileInput.value = "";
                            startNewTest();
                        });
                    };
                };
            } catch (err) { alert("올바른 백업 파일 형식이 아닙니다."); }
        };
        reader.readAsText(fileInput.files[0]);
    }

    // --- [아이용 퀴즈 시스템] ---
    function startNewTest() {
        document.getElementById('result-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'inline-block';
        
        if (wordListCache.length === 0) {
            document.getElementById('quiz-progress-text').innerText = "문제 0 / 0";
            document.getElementById('quiz-word').innerText = "단어가 없습니다.";
            document.getElementById('quiz-meaning').innerText = "단어 등록 탭으로 이동해 목소리를 먼저 추가해 주세요!";
            document.getElementById('play-voice-btn').style.display = 'none';
            return;
        }

        document.getElementById('play-voice-btn').style.display = 'inline-block';
        let shuffled = [...wordListCache].sort(() => 0.5 - Math.random());
        totalQuestions = Math.min(10, shuffled.length);
        quizSet = shuffled.slice(0, totalQuestions);
        currentIdx = 0;
        testedWords = [];
        loadQuestion();
    }

    function loadQuestion() {
        document.getElementById('quiz-progress-text').innerText = `문제 ${currentIdx + 1} / ${totalQuestions}`;
        document.getElementById('quiz-word').innerText = "";
        document.getElementById('quiz-meaning').innerText = "";
        setTimeout(() => { playQuizAudio(); }, 300);
    }

    function playQuizAudio() {
        const currentWord = quizSet[currentIdx];
        if (currentWord && currentWord.audio) playSpecificAudio(currentWord.audio);
    }

    function showAnswer() {
        const currentWord = quizSet[currentIdx];
        if (currentWord) {
            document.getElementById('quiz-word').innerText = currentWord.word;
            document.getElementById('quiz-meaning').innerText = `뜻: ${currentWord.meaning}`;
            if (!testedWords.includes(currentWord)) testedWords.push(currentWord);
        }
    }

    function nextQuiz() {
        if (wordListCache.length === 0) return;
        const currentWord = quizSet[currentIdx];
        if (currentWord && !testedWords.includes(currentWord)) testedWords.push(currentWord);

        currentIdx++;
        if (currentIdx < totalQuestions) {
            loadQuestion();
        } else {
            showTestResult();
        }
    }

    function showTestResult() {
        document.getElementById('quiz-progress-text').innerText = "테스트 완료! 💯";
        document.getElementById('quiz-word').innerText = "🎖️ 참 잘했어요! 🎖️";
        document.getElementById('quiz-meaning').innerText = "";
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('play-voice-btn').style.display = 'none';

        const scoreBoard = document.getElementById('score-board-list');
        let htmlStr = "<h4>이번에 출제되었던 단어 목록:</h4><ul>";
        testedWords.forEach(item => {
            htmlStr += `<li><strong>${item.word}</strong> : ${item.meaning}</li>`;
        });
        htmlStr += "</ul>";
        scoreBoard.innerHTML = htmlStr;
        document.getElementById('result-box').style.display = 'block';
    }

    initDB().then(() => { startNewTest(); }).catch(err => alert("초기화 실패"));
</script>

</body>
</html>
